<!DOCTYPE html>

<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小豁 — 豁達人生財經室知識助理</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1a18;
      --ink-soft: #2a2a28;
      --muted: #555;
      --border: #e4e4e0;
      --bg: #f7f6f3;
      --card: #ffffff;
      --accent: #2c2c28;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;

      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 72px 28px 48px;
      text-align: center;
    }

    .site-label {
      font-size: 14px;
      letter-spacing: 0.28em;
      color: var(--muted);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'DM Serif Display', 'Noto Serif TC', serif;
      font-size: 72px;
      font-weight: 500;
      letter-spacing: -0.005em;
      margin-bottom: 8px;
    }

    .h1-sub {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      color: var(--ink-soft);
      letter-spacing: 0.15em;
      margin-bottom: 24px;
    }

    .subtitle {
      font-size: 15.5px;
      color: var(--muted);
      font-weight: 400;
      line-height: 2;
      letter-spacing: 0.01em;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 28px auto;
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 0 28px 96px;
      flex: 1;
    }

    .input-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.9;
      letter-spacing: 0.01em;
      resize: none;
      min-height: 96px;
    }

    textarea::placeholder {
      color: #aaa;
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0ec;
    }

    .hint {
      font-size: 13px;
      color: #666;
      letter-spacing: 0.08em;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 13px 30px;
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 14px;
    }

    button:hover:not(:disabled) {
      background: #444;
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 20px 4px;
      color: var(--muted);
    }

    .loading.show {
      display: flex;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        opacity: 0.3;
      }

      40% {
        opacity: 1;
      }
    }

    .answer-card {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
      margin-bottom: 36px;
    }

    .answer-card.show {
      display: block;
    }

    .answer-label {
      font-size: 12px;
      letter-spacing: 0.18em;
      color: #666;
      margin-bottom: 20px;
    }

    .answer-text {
      font-size: 17px;
      line-height: 2.1;
      color: var(--ink-soft);
      font-weight: 400;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--muted);
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .examples {
      margin-top: 12px;
    }

    .examples-label {
      font-size: 12px;
      letter-spacing: 0.18em;
      color: #666;
      margin-bottom: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 14.5px;
      font-weight: 400;
      padding: 11px 20px;
      border-radius: 28px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    footer {
      width: 100%;
      max-width: 720px;
      padding: 22px 28px;
      text-align: center;
      font-size: 13px;
      color: #aaa;
      border-top: 1px solid var(--border);
    }
  </style>

</head>

<body>

  <header>
    <div class="site-label">豁達人生財經室</div>
    <h1>小豁</h1>
    <div class="h1-sub">知識助理</div>
    <div class="divider"></div>
    <div class="subtitle">
      基於豁達人生多年月報與投資哲學的知識助理<br>
      回答內容純屬知識整理，不代表任何投資建議
    </div>
  </header>

  <main>
    <div class="input-wrap">
      <textarea id="question" placeholder="輸入你的投資問題⋯⋯" rows="3"></textarea>
      <div class="input-footer">
        <span class="hint">Shift + Enter 換行　Enter 送出</span>
        <button id="askBtn" onclick="submitQuestion()">詢問小豁</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="dots"><span></span><span></span><span></span></div>
      <span>小豁正在思考⋯⋯</span>
    </div>

    <div class="answer-card" id="answerCard">
      <div class="answer-label">小豁的回答</div>
      <div class="answer-text" id="answerText"></div>
    </div>

    <div class="examples">
      <div class="examples-label">範例問題</div>
      <div class="chips">
        <div class="chip" onclick="useExample(this)">股市大跌很恐慌怎麼辦</div>
        <div class="chip" onclick="useExample(this)">什麼是比較原則</div>
        <div class="chip" onclick="useExample(this)">遇到黑天鵝怎麼辦</div>
        <div class="chip" onclick="useExample(this)">為什麼要100%持股</div>
        <div class="chip" onclick="useExample(this)">賣掉的股票繼續漲，我賣錯了嗎</div>
        <div class="chip" onclick="useExample(this)">大盤MACD轉負出清策略是什麼</div>
      </div>
    </div>

  </main>

  <footer>
    知識來源：豁達人生財經室
  </footer>

  <script>
    const textarea = document.getElementById('question')
    const btn = document.getElementById('askBtn')
    const loading = document.getElementById('loading')
    const card = document.getElementById('answerCard')
    const textEl = document.getElementById('answerText')

    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        submitQuestion()
      }
    })

    function useExample(el) {
      textarea.value = el.textContent
      textarea.focus()
    }

    async function submitQuestion() {
      const question = textarea.value.trim()
      if (!question) return

      btn.disabled = true
      loading.classList.add('show')
      card.classList.remove('show')
      textEl.textContent = ''

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        })

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''

        card.classList.add('show')
        loading.classList.remove('show')

        const cursor = document.createElement('span')
        cursor.className = 'cursor'
        textEl.appendChild(cursor)

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          buffer += decoder.decode(value, { stream: true })

          const parts = buffer.split('\n\n')
          buffer = parts.pop()

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue
            const raw = part.slice(6).trim()
            if (raw === '[DONE]') continue

            const obj = JSON.parse(raw)
            if (obj.token) {
              cursor.insertAdjacentText('beforebegin', obj.token)
            }
          }
        }

        cursor.remove()

      } catch (err) {
        textEl.textContent = '連線失敗，請稍後再試'
        card.classList.add('show')
        loading.classList.remove('show')
      } finally {
        btn.disabled = false
      }
    }
  </script>

</body>

</html>
