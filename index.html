<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小豁 — 豁達人生財經室知識助理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --border: #2e2b26;
      --accent: #c9a84c;
      --accent-dim: #7a6530;
      --text: #e8e0d0;
      --text-dim: #8a8070;
      --text-muted: #504840;
      --answer-bg: #161410;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 頂部 header ── */
    header {
      width: 100%;
      max-width: 760px;
      padding: 48px 24px 32px;
      text-align: center;
    }

    .logo-mark {
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent-dim);
      margin: 24px auto;
    }

    /* ── 主體 ── */
    main {
      width: 100%;
      max-width: 760px;
      padding: 0 24px 48px;
      flex: 1;
    }

    /* ── 輸入區 ── */
    .input-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.8;
      resize: none;
      min-height: 80px;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    button {
      background: var(--accent);
      color: #0f0e0c;
      border: none;
      padding: 10px 24px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) {
      background: #e0bc6a;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── 載入中 ── */
    .loading {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 20px;
      color: var(--text-dim);
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .loading.show { display: flex; }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── 回答區 ── */
    .answer-card {
      display: none;
      background: var(--answer-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 28px;
      animation: fadeIn 0.4s ease;
    }

    .answer-card.show { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .answer-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .answer-text {
      font-size: 15px;
      line-height: 2;
      color: var(--text);
      font-weight: 300;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── 範例問題 ── */
    .examples {
      margin-top: 32px;
    }

    .examples-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 300;
      padding: 7px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.03em;
    }

    .chip:hover {
      border-color: var(--accent-dim);
      color: var(--text);
    }

    /* ── footer ── */
    footer {
      width: 100%;
      max-width: 760px;
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--accent-dim);
      text-decoration: none;
    }

    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <div class="logo-mark">豁達人生財經室</div>
    <h1>小豁</h1>
    <div class="subtitle">
      基於豁達人生多年月報與投資哲學的知識助理<br>
      回答內容純屬知識整理，不代表任何投資建議
    </div>
    <div class="divider"></div>
  </header>

  <main>
    <div class="input-area">
      <textarea id="question" placeholder="輸入你的投資問題，例如：股市大跌很恐慌怎麼辦？" rows="3"></textarea>
      <div class="input-footer">
        <span class="hint">小豁會從豁達人生的文章中找答案</span>
        <button id="askBtn" onclick="submitQuestion()">詢問小豁</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
      <span>小豁正在查詢豁達人生的文章⋯⋯</span>
    </div>

    <div class="answer-card" id="answerCard">
      <div class="answer-label">小豁的回答</div>
      <div class="answer-text" id="answerText"></div>
    </div>

    <div class="examples">
      <div class="examples-label">範例問題</div>
      <div class="example-chips">
        <div class="chip" onclick="useExample(this)">股市大跌很恐慌怎麼辦</div>
        <div class="chip" onclick="useExample(this)">什麼是比較原則</div>
        <div class="chip" onclick="useExample(this)">遇到黑天鵝怎麼辦</div>
        <div class="chip" onclick="useExample(this)">為什麼要100%持股</div>
        <div class="chip" onclick="useExample(this)">賣掉的股票繼續漲，我賣錯了嗎</div>
        <div class="chip" onclick="useExample(this)">大盤MACD轉負出清策略是什麼</div>
      </div>
    </div>
  </main>

  <footer>
    知識來源：<a href="https://huodalife.pixnet.net/blog" target="_blank">豁達人生財經室</a>
    &nbsp;·&nbsp;
    回答內容純屬知識整理，不代表任何投資建議，也不保證資料完全正確
  </footer>

  <script>
    const textarea = document.getElementById('question')
    const btn      = document.getElementById('askBtn')
    const loading  = document.getElementById('loading')
    const card     = document.getElementById('answerCard')
    const text     = document.getElementById('answerText')

    // Enter 送出（Shift+Enter 換行）
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        submitQuestion()
      }
    })

    function useExample(el) {
      textarea.value = el.textContent
      textarea.focus()
    }

    async function submitQuestion() {
      const question = textarea.value.trim()
      if (!question) return

      // 顯示載入中
      btn.disabled = true
      loading.classList.add('show')
      card.classList.remove('show')

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        })

        const data = await res.json()

        text.textContent = data.answer || data.error || '發生錯誤，請稍後再試'
        card.classList.add('show')

      } catch (err) {
        text.textContent = '連線失敗，請稍後再試'
        card.classList.add('show')
      } finally {
        loading.classList.remove('show')
        btn.disabled = false
      }
    }
  </script>

</body>
</html>
