<!DOCTYPE html>

<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>小豁 — 豁達人生財經室知識助理</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1a18;
      --ink-soft: #2a2a28;
      --muted: #333;
      --border: #e4e4e0;
      --bg: #f7f6f3;
      --card: #ffffff;
      --accent: #2c2c28;
      --input-bar-height: 80px;
      /* 預估輸入列高度，給 scroll 用 */
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-weight: 400;
      min-height: 100vh;
    }

    /* 手機版：鎖住 viewport，固定底部輸入列 */
    @media (max-width: 600px) {
      body {
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: unset;
      }
    }

    /* ════════════════════════════════════
       側邊欄
    ════════════════════════════════════ */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 260px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 200;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: #888;
    }

    .sidebar-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 4px;
      width: auto;
      height: auto;
      font-size: 18px;
      line-height: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-close:hover {
      background: var(--bg);
      color: var(--ink);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-empty {
      padding: 32px 20px;
      font-size: 13px;
      color: #bbb;
      text-align: center;
      line-height: 2;
    }

    .sidebar-item {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f2;
      transition: background 0.15s;
    }

    .sidebar-item:hover {
      background: var(--bg);
    }

    .sidebar-item.active {
      background: #f0efeb;
    }

    .sidebar-item-q {
      font-size: 13.5px;
      color: var(--ink-soft);
      line-height: 1.6;
      letter-spacing: 0.01em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sidebar-item-time {
      font-size: 11px;
      color: #bbb;
      margin-top: 5px;
      letter-spacing: 0.05em;
    }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .clear-btn {
      width: 100%;
      height: 34px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #aaa;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      background: #fff0f0;
      color: #c0392b;
      border-color: #f5c6c6;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      z-index: 199;
    }

    .overlay.show {
      display: block;
    }

    /* ════════════════════════════════════
       歷史按鈕（左上角）
    ════════════════════════════════════ */
    .history-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      width: auto;
      height: 36px;
      padding: 0 14px;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: all 0.15s;
    }

    .history-toggle:hover {
      background: var(--bg);
      color: var(--ink);
    }

    .history-toggle svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ════════════════════════════════════
       捲動區域（header + 對話）
    ════════════════════════════════════ */
    /* 桌機：正常文件流 */
    @media (max-width: 600px) {
      .scroll-area {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 16px;
      }
    }

    /* ── Header（精簡，只在空白狀態顯示完整版） ── */
    header {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 32px;
      text-align: center;
      transition: padding 0.3s ease;
    }

    header.compact {
      padding: 64px 24px 16px;
    }

    .site-label {
      font-size: 13px;
      letter-spacing: 0.28em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'DM Serif Display', 'Noto Serif TC', serif;
      font-size: 64px;
      font-weight: 500;
      letter-spacing: -0.005em;
      margin-bottom: 6px;
    }

    header.compact h1 {
      font-size: 40px;
    }

    .h1-sub {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      color: var(--ink-soft);
      letter-spacing: 0.15em;
      margin-bottom: 20px;
    }

    header.compact .h1-sub {
      font-size: 14px;
      margin-bottom: 0;
    }

    .subtitle {
      font-size: 14.5px;
      color: var(--muted);
      line-height: 2;
      letter-spacing: 0.01em;
    }

    header.compact .subtitle,
    header.compact .divider {
      display: none;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 24px auto;
    }

    /* ── 對話區 ── */
    .chat-area {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* loading */
    .loading {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 16px 4px;
      color: var(--muted);
    }

    .loading.show {
      display: flex;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 1.2s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      80%,
      100% {
        opacity: 0.3
      }

      40% {
        opacity: 1
      }
    }

    /* 回答卡片 */
    .answer-card {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
      margin-bottom: 16px;
    }

    .answer-card.show {
      display: block;
    }

    .answer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .answer-label {
      font-size: 12px;
      letter-spacing: 0.18em;
      color: #666;
    }

    .new-question-btn {
      width: auto;
      height: 32px;
      padding: 0 14px;
      font-size: 13px;
      border-radius: 20px;
      background-color: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .new-question-btn:hover {
      background-color: var(--bg);
      color: var(--ink);
      border-color: #ccc;
    }

    .new-question-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .answer-text {
      font-size: 16px;
      line-height: 2.1;
      color: var(--ink-soft);
      font-weight: 400;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .answer-text a {
      color: #555;
      text-decoration: underline;
      text-underline-offset: 3px;
      word-break: break-all;
      overflow-wrap: break-word;
    }

    .answer-text a:hover {
      color: var(--ink);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--muted);
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0
      }
    }

    .error-text {
      color: #c0392b;
      font-size: 15px;
    }

    /* ════════════════════════════════════
       固定底部輸入列
    ════════════════════════════════════ */
    /* 桌機：輸入列跟著內容自然排列 */
    .input-bar {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 20px 24px 32px;
    }

    /* 手機：固定在底部，鍵盤上方 */
    @media (max-width: 600px) {
      .input-bar {
        flex-shrink: 0;
        padding: 12px 16px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
    }

    .input-inner {
      max-width: 680px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      font-size: 16px;
      /* 16px 避免 iOS 自動放大 */
      font-weight: 400;
      line-height: 1.7;
      letter-spacing: 0.01em;
      resize: none;
      min-height: 28px;
      max-height: 160px;
      overflow-y: auto;
    }

    textarea::placeholder {
      color: #aaa;
    }

    .send-btn {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      padding: 0;
      font-size: 16px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--ink);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      touch-action: manipulation;
      /* 避免 iOS 300ms 延遲產生雙擊 */
      user-select: none;
    }

    .send-btn:hover:not(:disabled) {
      background-color: #333;
    }

    .send-btn:active:not(:disabled) {
      background-color: #555;
      transform: scale(0.93);
    }

    .send-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ════════════════════════════════════
       手機
    ════════════════════════════════════ */
    @media (max-width: 600px) {
      h1 {
        font-size: 52px;
      }

      header.compact h1 {
        font-size: 34px;
      }

      header {
        padding: 72px 20px 28px;
      }

      .chat-area {
        padding: 0 16px;
      }

      .history-toggle span {
        display: none;
      }

      .history-toggle {
        padding: 0 12px;
      }
    }
  </style>

</head>

<body>

  <!-- 側邊欄遮罩 -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- 側邊欄 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">歷史記錄</div>
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-empty">還沒有對話記錄</div>
    </div>
    <div class="sidebar-footer">
      <button class="clear-btn" onclick="clearHistory()">清除所有記錄</button>
    </div>
  </div>

  <!-- 歷史按鈕 -->
  <button class="history-toggle" onclick="toggleSidebar()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
      stroke-linejoin="round">
      <circle cx="8" cy="8" r="6" />
      <path d="M8 5v3l2 2" />
    </svg>
    <span>歷史記錄</span>
  </button>

  <!-- 捲動區域 -->
  <div class="scroll-area" id="scrollArea">
    <header id="mainHeader">
      <div class="site-label">豁達人生財經室</div>
      <h1>小豁 1.0</h1>
      <div class="h1-sub">知識助理</div>
      <div class="divider"></div>
      <div class="subtitle">
        基於豁達人生財經室多年文章的知識助理<br>
        回答內容純屬知識整理，不代表任何投資建議
      </div>
    </header>

    <div class="chat-area">
      <div class="loading" id="loading">
        <div class="dots"><span></span><span></span><span></span></div>
        <span>小豁正在思考⋯⋯</span>
      </div>

      <div class="answer-card" id="answerCard">
        <div class="answer-header">
          <div class="answer-label">小豁的回答</div>
          <button class="new-question-btn" onclick="startNewQuestion()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M2 8a6 6 0 1 0 1.5-3.9" />
              <path d="M2 4v4h4" />
            </svg>
            重新提問
          </button>
        </div>
        <div class="answer-text" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- 固定底部輸入列 -->
  <div class="input-bar">
    <div class="input-inner">
      <textarea id="question" placeholder="輸入你的投資問題⋯⋯" rows="1"></textarea>
      <button class="send-btn" id="askBtn" onclick="submitQuestion()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M8 12V4M4 8l4-4 4 4" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    const textarea = document.getElementById('question')
    const btn = document.getElementById('askBtn')
    const loading = document.getElementById('loading')
    const card = document.getElementById('answerCard')
    const textEl = document.getElementById('answerText')
    const scrollArea = document.getElementById('scrollArea')
    const mainHeader = document.getElementById('mainHeader')

    // ── 捲到底部 ──────────────────────────────────────
    function scrollToBottom() {
      scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' })
    }

    // ── localStorage ──────────────────────────────────
    const STORAGE_KEY = 'xiaohuo_history'

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') }
      catch { return [] }
    }

    function saveHistory(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list))
    }

    function addToHistory(question, answer) {
      const list = loadHistory()
      list.unshift({ id: Date.now(), question, answer, time: new Date().toISOString() })
      saveHistory(list.slice(0, 100))
      renderSidebar()
    }

    // ── 側邊欄 ────────────────────────────────────────
    let activeId = null

    function renderSidebar() {
      const list = loadHistory()
      const el = document.getElementById('sidebarList')
      if (list.length === 0) {
        el.innerHTML = '<div class="sidebar-empty">還沒有對話記錄</div>'
        return
      }
      el.innerHTML = list.map(item => `
        <div class="sidebar-item ${item.id === activeId ? 'active' : ''}" onclick="loadFromHistory(${item.id})">
          <div class="sidebar-item-q">${escapeHtml(item.question)}</div>
          <div class="sidebar-item-time">${formatTime(item.time)}</div>
        </div>
      `).join('')
    }

    function loadFromHistory(id) {
      const list = loadHistory()
      const item = list.find(i => i.id === id)
      if (!item) return
      activeId = id
      renderSidebar()
      textarea.value = item.question
      autoResizeTextarea()
      textEl.innerHTML = linkify(item.answer)
      textEl.className = 'answer-text'
      card.classList.add('show')
      loading.classList.remove('show')
      mainHeader.classList.add('compact')
      closeSidebar()
      setTimeout(scrollToBottom, 50)
    }

    function clearHistory() {
      if (!confirm('確定要清除所有歷史記錄嗎？')) return
      localStorage.removeItem(STORAGE_KEY)
      activeId = null
      renderSidebar()
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar')
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
    }
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open')
      document.getElementById('overlay').classList.add('show')
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open')
      document.getElementById('overlay').classList.remove('show')
    }

    // ── 工具 ──────────────────────────────────────────
    function formatTime(isoStr) {
      const d = new Date(isoStr)
      const today = new Date()
      const isToday = d.toDateString() === today.toDateString()
      const hhmm = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`
      return isToday ? `今天 ${hhmm}` : `${d.getMonth() + 1}/${d.getDate()} ${hhmm}`
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }

    function linkify(text) {
      const pre = text.replace(/<a\s+href="(https?:\/\/[^"]+)"[^>]*>(.*?)<\/a>/gi, (_, url, label) => `[${label.trim()}](${url})`)
      const parts = []
      let last = 0
      const re = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g
      let m
      while ((m = re.exec(pre)) !== null) {
        parts.push(escapeHtml(pre.slice(last, m.index)))
        parts.push(`<a href="${m[2]}" target="_blank" rel="noopener noreferrer">${escapeHtml(m[1])}</a>`)
        last = m.index + m[0].length
      }
      parts.push(escapeHtml(pre.slice(last)))
      return parts.join('').replace(/(?<!href=")(https?:\/\/[^\s\u3000\uff09\u0029\]<"]+)/g, url =>
        `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`)
    }

    // ── textarea 自動高度 ─────────────────────────────
    function autoResizeTextarea() {
      textarea.style.height = 'auto'
      textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px'
    }

    textarea.addEventListener('input', autoResizeTextarea)

    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        submitQuestion()
      }
    })

    // ── 重新提問 ──────────────────────────────────────
    function startNewQuestion() {
      card.classList.remove('show')
      textEl.innerHTML = ''
      textarea.value = ''
      textarea.style.height = 'auto'
      activeId = null
      mainHeader.classList.remove('compact')
      renderSidebar()
      textarea.focus()
      scrollArea.scrollTo({ top: 0, behavior: 'smooth' })
    }

    // ── 送出問題 ──────────────────────────────────────
    let isSubmitting = false

    async function submitQuestion() {
      if (isSubmitting) return
      const question = textarea.value.trim()
      if (!question) return

      isSubmitting = true
      btn.disabled = true
      card.classList.remove('show')
      textEl.innerHTML = ''
      textEl.className = 'answer-text'
      loading.classList.add('show')
      mainHeader.classList.add('compact')
      activeId = null

      // 捲到 loading 可見
      setTimeout(scrollToBottom, 50)

      let fullAnswer = ''

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        })

        if (!res.ok) throw new Error(`Server error: ${res.status}`)

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''

        loading.classList.remove('show')
        card.classList.add('show')

        const cursor = document.createElement('span')
        cursor.className = 'cursor'
        textEl.appendChild(cursor)

        // 捲到回答卡片
        setTimeout(scrollToBottom, 50)

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          buffer += decoder.decode(value, { stream: true })
          const parts = buffer.split('\n\n')
          buffer = parts.pop()

          for (const part of parts) {
            if (!part.startsWith('data: ')) continue
            const raw = part.slice(6).trim()
            if (raw === '[DONE]') continue
            try {
              const obj = JSON.parse(raw)
              if (obj.token) {
                fullAnswer += obj.token
                cursor.insertAdjacentText('beforebegin', obj.token)
                // 串流時持續捲到底
                scrollArea.scrollTo({ top: scrollArea.scrollHeight })
              }
            } catch { /* skip */ }
          }
        }

        cursor.remove()
        if (fullAnswer) {
          textEl.innerHTML = linkify(fullAnswer)
          addToHistory(question, fullAnswer)
          scrollToBottom()
        }

      } catch (err) {
        loading.classList.remove('show')
        textEl.textContent = '連線失敗，請稍後再試'
        textEl.className = 'answer-text error-text'
        card.classList.add('show')
        scrollToBottom()
      } finally {
        isSubmitting = false
        btn.disabled = false
      }
    }

    // 初始化
    renderSidebar()
  </script>

</body>

</html>
